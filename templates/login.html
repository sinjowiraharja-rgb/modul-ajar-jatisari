{% extends "base.html" %}

{% block title %}Login - Modul Ajar Jatisari{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-journal-bookmark-fill text-success" style="font-size: 3rem;"></i>
                        <h3 class="mt-3 fw-bold text-success">Modul Ajar Jatisari</h3>
                        <p class="text-muted">SD Negeri Jatisari</p>
                    </div>
                    <form method="POST" action="{{ url_for('login') }}">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Login
                            </button>
                        </div>
                    </form>
                    <hr class="my-4">
                    <div class="text-center small text-muted">
                        Akun default admin:<br>
                        <strong>admin</strong> / <strong>admin123</strong>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
